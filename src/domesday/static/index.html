<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BBC Domesday Walk Navigator</title>
  <style>
    :root {
      --bg:            #000030;
      --panel:         #00003A;
      --accent:        #00CCFF;
      --accent-yellow: #FFD700;
      --text:          #FFFFFF;
      --dim:           #7AAFC8;
      --border:        rgba(0, 204, 255, 0.28);
      --btn-active:    #001840;
      --btn-hover:     #00CCFF;
      --btn-disabled:  #00091A;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      min-height: 100vh;
    }

    /* ── Title bar: full-width cyan strip, dark navy text ── */
    #title-bar {
      background: var(--accent);
      color: #000050;
      text-align: center;
      padding: 0.45rem 1rem;
      font-size: 1.15rem;
      font-weight: bold;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      user-select: none;
      flex-shrink: 0;
    }

    /* ── Padded content area below the title bar ── */
    #page-body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
      gap: 1rem;
      flex: 1;
    }

    #main-layout {
      display: flex;
      gap: 1.5rem;
      align-items: flex-start;
      width: 100%;
      max-width: 1100px;
    }

    /* ── Frame display ── */
    #frame-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    /* ── Frame image container (for overlay positioning) ── */
    #frame-container {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
    }

    #frame-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #000;
      border: 2px solid var(--accent);
      box-shadow: 0 0 16px rgba(0, 204, 255, 0.2);
      object-fit: fill;
      display: none;
    }

    #frame-placeholder {
      position: absolute;
      inset: 0;
      background: #000;
      border: 2px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--dim);
      font-size: 0.9rem;
    }

    #detail-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .detail-dot {
      position: absolute;
      width: 22px;
      height: 22px;
      border: 2px solid var(--accent-yellow);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      cursor: pointer;
      pointer-events: auto;
      box-sizing: border-box;
      background: rgba(255, 215, 0, 0.1);
      transition: background 0.15s, border-color 0.15s;
    }
    .detail-dot:hover {
      background: rgba(255, 215, 0, 0.3);
      border-color: #fff;
    }
    .detail-dot::after {
      content: '⌖';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--accent-yellow);
      pointer-events: none;
    }

    /* ── Right side: controls + info ── */
    #right-panel {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 280px;
      flex-shrink: 0;
    }

    /* ── Compass navigation ── */
    #compass {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    #compass-middle {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    #compass-rose {
      width: 52px;
      height: 52px;
      flex-shrink: 0;
      user-select: none;
    }

    .nav-btn {
      background: var(--accent);
      border: 1px solid var(--accent);
      color: #000050;
      font-family: inherit;
      padding: 8px 10px;
      font-size: 0.75rem;
      font-weight: bold;
      letter-spacing: 0.05em;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.15s, border-color 0.15s;
      border-radius: 3px;
      min-width: 64px;
      text-align: center;
    }

    .nav-btn:hover:not(:disabled) { background: var(--accent-yellow); border-color: var(--accent-yellow); }

    .nav-btn:disabled {
      background: var(--btn-disabled);
      color: var(--dim);
      cursor: not-allowed;
      border-color: #0A1F33;
    }

    /* ── Info panel ── */
    #info-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.75rem;
      font-size: 0.8rem;
      line-height: 1.7;
    }

    #info-panel .label { color: var(--dim); }
    #info-panel .value { color: var(--accent); font-weight: bold; }

    /* ── Plan thumbnail ── */
    #plan-section {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    #plan-label {
      font-size: 0.7rem;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    #plan-container {
      position: relative;
      width: 100%;
      display: none;
    }

    #plan-img {
      width: 100%;
      aspect-ratio: 4/3;
      background: #000;
      border: 1px solid var(--border);
      object-fit: contain;
      display: block;
    }

    #plan-marker {
      position: absolute;
      width: 14px;
      height: 14px;
      pointer-events: none;
      display: none;
      transform-origin: center center;
    }

    /* ── Home button ── */
    #btn-home {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--dim);
      padding: 5px 8px;
      font-size: 0.7rem;
      font-family: inherit;
      letter-spacing: 0.05em;
      cursor: pointer;
      text-transform: uppercase;
      border-radius: 3px;
      align-self: flex-start;
      transition: color 0.15s, border-color 0.15s;
    }
    #btn-home:hover { color: var(--accent); border-color: var(--accent); }

    /* ── Status bar ── */
    #status {
      font-size: 0.75rem;
      color: var(--dim);
      min-height: 1.2em;
    }

    /* ── Loading dimming ── */
    #frame-panel.loading #frame-img { opacity: 0.4; }
    #frame-panel.loading #detail-overlay { opacity: 0.2; }

    /* ── Plan expand hint ── */
    #plan-expand-hint { font-size: 0.65rem; color: var(--dim); }

    /* ── Map modal ── */
    #map-modal {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
    }
    #map-modal-bg {
      position: absolute; inset: 0; background: rgba(0,0,0,0.88);
    }
    #map-modal-inner {
      position: relative; z-index: 1;
      background: var(--panel); border: 2px solid var(--accent);
      border-radius: 6px; padding: 10px;
      display: flex; flex-direction: column; gap: 8px;
      box-shadow: 0 0 24px rgba(0, 204, 255, 0.2);
    }
    #map-modal-header {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.8rem; color: var(--accent);
    }
    #map-modal-header button {
      background: transparent; border: 1px solid var(--accent);
      color: var(--accent); font-family: inherit; font-size: 0.75rem;
      padding: 2px 8px; cursor: pointer; border-radius: 3px;
      transition: background 0.15s, color 0.15s;
    }
    #map-modal-header button:hover { background: var(--accent); color: #000030; }
    #map-container {
      position: relative;
      width: min(80vw, calc(72vh * 4 / 3));
      aspect-ratio: 4/3;
    }
    #map-img { width: 100%; height: 100%; object-fit: fill; background: #000; display: block; }
    #map-positions { position: absolute; inset: 0; pointer-events: none; }
    .map-pos {
      position: absolute; width: 10px; height: 10px; border-radius: 50%;
      transform: translate(-50%,-50%); cursor: pointer; pointer-events: auto;
      background: rgba(0,30,80,0.9); border: 1.5px solid var(--accent);
      transition: all 0.1s;
    }
    .map-pos:hover { background: var(--accent-yellow); border-color: #fff; width: 14px; height: 14px; z-index: 1; }
    .map-pos.current { background: var(--accent-yellow); border-color: #fff; width: 14px; height: 14px; }
    .map-pos-arrow {
      position: absolute; pointer-events: none;
      transform-origin: center center; line-height: 0;
    }
    #map-hint { font-size: 0.65rem; color: var(--dim); text-align: center; }

    /* ── Detail modal ── */
    #detail-modal {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
    }
    #detail-modal-bg {
      position: absolute; inset: 0; background: rgba(0,0,0,0.88);
    }
    #detail-modal-inner {
      position: relative; z-index: 1;
      background: var(--panel); border: 2px solid var(--accent);
      border-radius: 6px; padding: 10px;
      display: flex; flex-direction: column; gap: 8px;
      width: min(90vw, calc(72vh * 4 / 3));
      min-width: 67rem;
      box-shadow: 0 0 24px rgba(0, 204, 255, 0.2);
    }
    /* Narrower modal for plain essay content (no photo column) */
    #detail-modal-inner.essay-mode {
      width: min(90vw, 42rem);
      min-width: min(90vw, 32rem);
    }
    #detail-modal-header {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.8rem; color: var(--accent);
    }
    #detail-modal-header button {
      background: transparent; border: 1px solid var(--accent);
      color: var(--accent); font-family: inherit; font-size: 0.75rem;
      padding: 2px 8px; cursor: pointer; border-radius: 3px;
      transition: background 0.15s, color 0.15s;
    }
    #detail-modal-header button:hover { background: var(--accent); color: #000030; }
    #detail-photo-row {
      display: flex; flex-direction: row; gap: 10px; align-items: flex-start;
    }
    #detail-frame-container {
      flex: 0 0 70%; min-width: 0; aspect-ratio: 4/3; background: #000;
    }
    #detail-info-panel {
      flex: 1; display: flex; flex-direction: column; gap: 0.5rem;
      min-width: 0; overflow-wrap: break-word;
    }
    #detail-frame-img { width: 100%; height: 100%; object-fit: fill; display: block; }
    #detail-nav {
      display: flex; justify-content: center; align-items: center; gap: 1rem;
      font-size: 0.75rem;
    }
    #detail-nav button {
      background: var(--btn-active); border: 1px solid var(--accent);
      color: var(--text); font-family: inherit; font-size: 0.75rem;
      padding: 4px 12px; cursor: pointer; border-radius: 3px;
      transition: background 0.15s, color 0.15s;
    }
    #detail-nav button:hover:not(:disabled) { background: var(--btn-hover); color: #000030; }
    #detail-nav button:disabled { background: var(--btn-disabled); color: var(--dim); cursor: not-allowed; border-color: #0A1F33; }
    #detail-counter { color: var(--dim); display: flex; align-items: center; gap: 0.3em; }
    #detail-num {
      width: 3.5em; text-align: center;
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text); font-family: inherit; font-size: 0.75rem;
      padding: 2px 4px; border-radius: 3px;
    }
    #detail-num::-webkit-inner-spin-button, #detail-num::-webkit-outer-spin-button { opacity: 0.5; }
    #detail-slider { width: 100%; accent-color: var(--accent); cursor: pointer; margin: 0; }
    #detail-caption {
      font-size: 0.82rem; color: var(--accent); min-height: 1.1em;
    }
    #detail-description {
      font-size: 0.72rem; color: var(--dim); white-space: pre-line;
      max-height: 25em; overflow-y: auto; line-height: 1.35;
      padding: 0.4rem 0.5rem; border: 1px solid var(--border);
      border-radius: 3px; background: var(--bg); min-width: 19rem;
    }
    .map-pos.has-details { background: rgba(0,140,60,0.9); border-color: #00d060; }

    #detail-text-container { display: flex; flex-direction: column; gap: 0.3rem; }
    #detail-page-title { font-size: 0.8rem; color: var(--accent); text-align: center; min-height: 1.1em; }
    #detail-text {
      font-family: 'Courier New', monospace; font-size: 0.7rem; line-height: 1.35;
      white-space: pre-wrap; overflow-y: auto; max-height: 55vh;
      padding: 0.5rem; background: var(--bg);
      border: 1px solid var(--border); border-radius: 3px; color: var(--text);
    }

    .essay-fig-link {
      color: var(--accent); cursor: pointer; text-decoration: underline;
      font-weight: bold;
    }
    .essay-fig-link:hover { color: #fff; }

    /* ── Concatenated essay separators and sub-title headers ── */
    hr.essay-page-sep {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0.6rem 0;
    }
    .essay-page-header {
      font-size: 0.72rem;
      color: var(--accent);
      font-weight: bold;
      letter-spacing: 0.05em;
      margin-bottom: 0.2rem;
    }
  </style>
</head>
<body>
  <div id="title-bar">BBC Domesday Walk Navigator</div>

  <div id="page-body">
  <div id="main-layout">
    <div id="frame-panel">
      <div id="frame-container">
        <img id="frame-img" alt="Domesday frame">
        <div id="frame-placeholder">Loading…</div>
        <div id="detail-overlay"></div>
      </div>
      <div id="status"></div>
    </div>

    <div id="right-panel">

      <!-- Plan thumbnail -->
      <div id="plan-section">
        <div id="plan-label">Plan view <span id="plan-expand-hint">(click to expand)</span></div>
        <div id="plan-container" onclick="openMapModal()" style="cursor:pointer">
          <img id="plan-img" alt="Plan view">
          <div id="plan-marker">
            <svg viewBox="0 0 14 14" width="14" height="14">
              <polygon points="7,1 13,13 7,10 1,13" fill="#FFD700" stroke="#fff" stroke-width="0.5"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- Compass navigation -->
      <div id="compass">
        <button class="nav-btn" id="btn-n" data-dir="forward" title="Move forward (↑)">▲ Forward</button>
        <div id="compass-middle">
          <button class="nav-btn" id="btn-w" data-dir="turn_left"  title="Turn left (←)">◄ Left</button>
          <div id="compass-rose"><svg viewBox="0 0 52 52" width="52" height="52" style="display:block">
            <circle cx="26" cy="26" r="24" fill="#00003A" stroke="rgba(0,204,255,0.28)" stroke-width="1.5"/>
            <!-- Cardinal ticks -->
            <line x1="26" y1="2.5" x2="26" y2="9"   stroke="#7AAFC8" stroke-width="1.5"/><!-- N -->
            <line x1="49.5" y1="26" x2="43" y2="26"  stroke="#7AAFC8" stroke-width="1.5"/><!-- E -->
            <line x1="26" y1="49.5" x2="26" y2="43"  stroke="#7AAFC8" stroke-width="1.5"/><!-- S -->
            <line x1="2.5" y1="26" x2="9" y2="26"    stroke="#7AAFC8" stroke-width="1.5"/><!-- W -->
            <!-- Intercardinal ticks -->
            <line x1="43.0" y1="9.0"  x2="38.5" y2="13.5" stroke="#3D6A8A" stroke-width="1"/><!-- NE -->
            <line x1="43.0" y1="43.0" x2="38.5" y2="38.5" stroke="#3D6A8A" stroke-width="1"/><!-- SE -->
            <line x1="9.0"  y1="43.0" x2="13.5" y2="38.5" stroke="#3D6A8A" stroke-width="1"/><!-- SW -->
            <line x1="9.0"  y1="9.0"  x2="13.5" y2="13.5" stroke="#3D6A8A" stroke-width="1"/><!-- NW -->
            <!-- N label -->
            <text x="26" y="12" text-anchor="middle" dominant-baseline="middle"
                  fill="#00CCFF" font-size="6" font-family="Courier New,monospace" font-weight="bold">N</text>
            <!-- Rotating needle (points in the direction the viewer faces) -->
            <g id="compass-needle" transform="rotate(0 26 26)">
              <polygon points="26,14 29.5,26 22.5,26" fill="#00CCFF"/>
              <polygon points="26,38 29.5,26 22.5,26" fill="#1a3a50"/>
              <circle cx="26" cy="26" r="2.5" fill="#000050" stroke="#00CCFF" stroke-width="1"/>
            </g>
          </svg></div>
          <button class="nav-btn" id="btn-e" data-dir="turn_right" title="Turn right (→)">Right ►</button>
        </div>
        <button class="nav-btn" id="btn-s" data-dir="back" title="Move back (↓)">▼ Back</button>
      </div>

      <!-- Info panel -->
      <div id="info-panel">
        <div><span class="label">View:    </span> <span class="value" id="info-view">—</span></div>
        <div><span class="label">Frame:   </span> <span class="value" id="info-frame">—</span></div>
        <div><span class="label">Dataset: </span> <span class="value" id="info-dataset">Gallery</span></div>
        <div><span class="label">Fwd→:    </span> <span class="value" id="info-forward">—</span></div>
      </div>

      <!-- Home button -->
      <button id="btn-home" onclick="goHome()" title="Return to gallery start">&#8962; Home</button>

    </div>
  </div>
  </div><!-- #page-body -->

  <!-- Detail modal -->
  <div id="detail-modal" style="display:none">
    <div id="detail-modal-bg" onclick="closeDetailModal()"></div>
    <div id="detail-modal-inner">
      <div id="detail-modal-header">
        <span id="detail-modal-title">Detail</span>
        <button onclick="closeDetailModal()">&#x2715; Close</button>
      </div>
      <div id="detail-photo-row">
        <div id="detail-frame-container">
          <img id="detail-frame-img" alt="Detail view">
        </div>
        <div id="detail-info-panel">
          <div id="detail-caption"></div>
          <div id="detail-description" style="display:none"></div>
        </div>
      </div>
      <div id="detail-text-container" style="display:none">
        <div id="detail-page-title"></div>
        <div id="detail-text"></div>
      </div>
      <div id="detail-nav">
        <button id="detail-btn-first" onclick="goDetail(0)" title="First (Home)">|&#9664;</button>
        <button id="detail-btn-prev" onclick="stepDetail(-1)" title="Previous (←)">&#9664; Prev</button>
        <span id="detail-counter">
          <input id="detail-num" type="number" min="1" max="1" value="1"
                 onchange="goDetail(+this.value - 1)">
          / <span id="detail-total">1</span>
        </span>
        <button id="detail-btn-next" onclick="stepDetail(1)" title="Next (→)">Next &#9654;</button>
        <button id="detail-btn-last" onclick="goDetail(_detailCount() - 1)" title="Last (End)">&#9654;|</button>
      </div>
      <input id="detail-slider" type="range" min="1" max="1" value="1" style="display:none"
             oninput="goDetail(+this.value - 1)">
    </div>
  </div>

  <!-- Map modal -->
  <div id="map-modal" style="display:none">
    <div id="map-modal-bg" onclick="closeMapModal()"></div>
    <div id="map-modal-inner">
      <div id="map-modal-header">
        <span>Walk Map</span>
        <button id="btn-toggle-overlay" onclick="toggleMapOverlay()">&#9632; Hide overlay</button>
        <button onclick="closeMapModal()">&#x2715; Close</button>
      </div>
      <div id="map-container">
        <img id="map-img" alt="Walk map">
        <svg id="map-lines" viewBox="0 0 100 100" preserveAspectRatio="none"
             style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible"></svg>
        <div id="map-positions"></div>
      </div>
      <div id="map-hint">Click a position to navigate there &middot; Esc to close</div>
    </div>
  </div>

  <script>
    // ── State ──────────────────────────────────────────────────────────────
    let currentView = null;
    let currentDatasetOffset = 0;   // byte offset in GALLERY file; 0 = main gallery
    let currentNode = null;
    let _mapOverlayVisible = true;

    // BBC Micro display coordinate constants (from sdhd.h)
    const BBC_W      = 1280;  // display area width (x: 0-1279)
    const BBC_DISH   = 888;   // display area height (y: 0-887, Y=0 at BOTTOM)
    const BBC_FULL_H = 1024;  // full BBC screen height in graphics units
    const DIS_Y0     = 76;    // m.sd.disY0: display area Y origin in full BBC coords

    // BBC Master PAL timing — the BBC's active display does not fill the entire
    // PAL video frame; overscan areas are outside the BBC coordinate space.
    //
    // Horizontal (2 MHz CRTC, R0=127, R1=80, R2=98):
    //   Display start ≈ 4.6 µs into 52 µs active video → H_OFFSET = 4.6/52 = 8.65 %
    //   Display width ≈ 40 µs / 52 µs of active video → H_SCALE  = 40/52 = 76.9 %
    //
    // Vertical (256 display lines/field, 288 PAL active lines/field):
    //   Offset = (288−256)/2/288 = 5.56 %  → V_SCALE = 88.88 %
    // PAL geometry — all four overridden at boot from /api/config
    let BBC_H_OFFSET = 8.65;   // % from JPEG left where BBC x=0 appears
    let BBC_H_SCALE  = 76.9;   // % of JPEG width covered by BBC x range
    let BBC_V_OFFSET = 5.56;   // % from JPEG top where BBC y=1023 appears
    let BBC_V_SCALE  = 88.88;  // % of JPEG height covered by BBC y range

    // Map BBC display-area coords → JPEG image percentages.
    //   1. Add DIS_Y0 to convert display-area Y to full BBC screen Y.
    //   2. Apply PAL horizontal and vertical margins.
    //   3. Invert Y (BBC Y=0 is at screen bottom).
    function bbcToImagePct(x, y) {
      const bbc_y = y + DIS_Y0;
      return [
        BBC_H_OFFSET + (x / BBC_W) * BBC_H_SCALE,
        BBC_V_OFFSET + (BBC_FULL_H - bbc_y) / BBC_FULL_H * BBC_V_SCALE,
      ];
    }

    // ── DOM refs ────────────────────────────────────────────────────────────
    const frameImg         = document.getElementById('frame-img');
    const framePlaceholder = document.getElementById('frame-placeholder');
    const framePanel       = document.getElementById('frame-panel');
    const detailOverlay    = document.getElementById('detail-overlay');
    const statusEl         = document.getElementById('status');
    const planContainer    = document.getElementById('plan-container');
    const planImg          = document.getElementById('plan-img');
    const planMarker       = document.getElementById('plan-marker');

    const infoView    = document.getElementById('info-view');
    const infoFrame   = document.getElementById('info-frame');
    const infoDataset = document.getElementById('info-dataset');
    const infoForward = document.getElementById('info-forward');

    // All nav buttons
    const navButtons = document.querySelectorAll('.nav-btn');

    // ── API helpers ─────────────────────────────────────────────────────────
    async function apiGet(url) {
      const r = await fetch(url);
      if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
      return r.json();
    }

    // ── Render a node ────────────────────────────────────────────────────────
    function renderNode(node) {
      currentNode = node;
      currentView = node.view;
      if (typeof node.dataset_offset === 'number') {
        currentDatasetOffset = node.dataset_offset;
      }
      _pushHash();  // update shareable URL (no detail open)

      // Update info panel
      infoView.textContent    = node.view;
      infoFrame.textContent   = node.frame;
      infoDataset.textContent = currentDatasetOffset === 0
        ? 'Gallery'
        : (_walkByOffset[currentDatasetOffset] ?? `Walk @${currentDatasetOffset}`);
      infoForward.textContent = node.forward !== null ? `view ${node.forward}` : 'dead end';

      // Load frame image
      setStatus('Loading frame…');
      const src = `/frame/${node.frame}`;
      frameImg.onload = () => {
        framePlaceholder.style.display = 'none';
        frameImg.style.display = 'block';
        framePanel.classList.remove('loading');
        setStatus('');
      };
      frameImg.onerror = () => {
        framePlaceholder.textContent = `Frame ${node.frame} not found`;
        framePlaceholder.style.display = 'flex';
        frameImg.style.display = 'none';
        framePanel.classList.remove('loading');
        setStatus('Frame image missing');
      };
      framePanel.classList.add('loading');
      frameImg.src = src;

      // Plan image + position marker
      updatePlanMarker(node);
      updateCompassRose(node);

      // Detail icon overlay
      updateDetailOverlay(node);

      // Update navigation buttons
      updateNavButtons(node);
    }

    // ── Compass rose ──────────────────────────────────────────────────────
    function updateCompassRose(node) {
      const needle = document.getElementById('compass-needle');
      if (!needle || !node.plan) return;
      const dir = ((8 - node.plan.base_direction + node.view) % 8 + 8) % 8;
      needle.setAttribute('transform', `rotate(${dir * 45} 26 26)`);
    }

    // ── Plan position marker ──────────────────────────────────────────────
    function updatePlanMarker(node) {
      if (node.plan_frame !== null && node.plan !== null) {
        planImg.src = `/frame/${node.plan_frame}`;
        planContainer.style.display = 'block';

        // Plan coords are in BBC display space (X 0-1279, Y 0-887, Y=0 at BOTTOM).
        const [xPct, yPct] = bbcToImagePct(node.plan.x, node.plan.y);

        // Facing direction: BCPL formula (8 - base_direction + view) mod 8, then × 45°
        const dir = ((8 - node.plan.base_direction + node.view) % 8 + 8) % 8;
        planMarker.style.left      = `${xPct}%`;
        planMarker.style.top       = `${yPct}%`;
        planMarker.style.transform = `translate(-50%, -50%) rotate(${dir * 45}deg)`;
        planMarker.style.display   = 'block';
      } else {
        planContainer.style.display = 'none';
        planMarker.style.display    = 'none';
      }
    }

    // ── Detail icon overlay ───────────────────────────────────────────────
    async function updateDetailOverlay(node) {
      detailOverlay.innerHTML = '';
      if (!node.details || node.details.length === 0) return;

      const dotMap = {};
      for (const d of node.details) {
        const [xPct, yPct] = bbcToImagePct(d.x, d.y);
        const dot = document.createElement('div');
        dot.className = 'detail-dot';
        dot.id = `detail-${d.item_offset}`;
        dot.style.left = `${xPct}%`;
        dot.style.top  = `${yPct}%`;
        dot.title = `Item (offset ${d.item_offset})`;
        dot.addEventListener('click', () => openDetailModal(d.item_offset));
        detailOverlay.appendChild(dot);
        dotMap[d.item_offset] = dot;
      }

      // Async title fetch — dots appear immediately; titles update once API returns
      try {
        const titles = await apiGet(
          `/api/detail_titles?dataset=${currentDatasetOffset}&view=${node.view}`
        );
        for (const [offset, info] of Object.entries(titles)) {
          const dot = dotMap[parseInt(offset)];
          if (dot && info.title) dot.title = info.title;
        }
      } catch (_) {}
    }

    function updateNavButtons(node) {
      const fwd  = node.forward !== null || node.linked_dataset;
      const back = node.navigable && node.navigable.back;
      document.getElementById('btn-n').disabled = !fwd;
      document.getElementById('btn-s').disabled = !back;
      // Turning is always possible
      document.getElementById('btn-w').disabled = false;
      document.getElementById('btn-e').disabled = false;
    }

    // ── Navigation ───────────────────────────────────────────────────────────
    async function navigate(direction) {
      if (currentView === null) return;
      setStatus(`Moving ${direction}…`);
      try {
        const node = await apiGet(`/api/navigate/${currentView}/${direction}?dataset=${currentDatasetOffset}`);
        renderNode(node);
      } catch (err) {
        setStatus(`No move: ${err.message}`);
      }
    }

    async function goHome() {
      currentDatasetOffset = 0;
      setStatus('Returning to gallery start…');
      try {
        const node = await apiGet('/api/initial');
        renderNode(node);
        setStatus('');
      } catch (err) {
        setStatus(`Failed: ${err.message}`);
      }
    }

    navButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        const dir = btn.dataset.dir;
        if (dir) navigate(dir);
      });
    });

    // Keyboard controls
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeMapModal(); closeDetailModal(); return; }

      // When the detail modal is open, arrow/Home/End keys navigate photos or text pages
      if (document.getElementById('detail-modal').style.display !== 'none'
          && _detailCount() > 0) {
        if (_essayMode) return;  // essay is one scrollable block — let browser handle keys
        if (e.target.id === 'detail-num') return; // let the number input handle its own keys
        if (e.key === 'ArrowLeft')  { e.preventDefault(); stepDetail(-1); return; }
        if (e.key === 'ArrowRight') { e.preventDefault(); stepDetail(1);  return; }
        if (e.key === 'Home')       { e.preventDefault(); goDetail(0); return; }
        if (e.key === 'End')        { e.preventDefault(); goDetail(_detailCount() - 1); return; }
        if (e.key === 'ArrowUp' || e.key === 'ArrowDown') { e.preventDefault(); return; }
        return;
      }

      const map = {
        'ArrowUp':    'forward',
        'ArrowDown':  'back',
        'ArrowLeft':  'turn_left',
        'ArrowRight': 'turn_right',
      };
      if (map[e.key]) {
        e.preventDefault();
        navigate(map[e.key]);
      }
    });

    // ── Double-click navigation on main image ─────────────────────────────────
    // Left 10% → turn left, right 10% → turn right, centre → forward
    document.getElementById('frame-container').addEventListener('dblclick', e => {
      if (e.target.classList.contains('detail-dot')) return;
      const rect = e.currentTarget.getBoundingClientRect();
      const xPct = (e.clientX - rect.left) / rect.width;
      if (xPct < 0.25) {
        navigate('turn_left');
      } else if (xPct > 0.75) {
        navigate('turn_right');
      } else {
        navigate('forward');
      }
    });

    // ── Map modal ─────────────────────────────────────────────────────────────
    function toggleMapOverlay() {
      _mapOverlayVisible = !_mapOverlayVisible;
      document.getElementById('map-lines').style.display     = _mapOverlayVisible ? '' : 'none';
      document.getElementById('map-positions').style.display = _mapOverlayVisible ? '' : 'none';
      document.getElementById('btn-toggle-overlay').textContent =
        (_mapOverlayVisible ? '\u25a0 Hide overlay' : '\u25a1 Show overlay');
    }

    async function openMapModal() {
      if (!currentNode?.plan) return;
      _mapOverlayVisible = true;
      document.getElementById('map-lines').style.display     = '';
      document.getElementById('map-positions').style.display = '';
      document.getElementById('btn-toggle-overlay').textContent = '\u25a0 Hide overlay';
      const pn = currentNode.plan.plan_number;
      setStatus('Loading walk map…');
      try {
        const data = await apiGet(
          `/api/plan_nodes?dataset=${currentDatasetOffset}&plan_number=${pn}`
        );
        document.getElementById('map-img').src = `/frame/${data.plan_frame}`;

        // Draw forward-link edges as SVG lines
        const svg = document.getElementById('map-lines');
        svg.innerHTML = '';
        for (const edge of data.edges) {
          const src = data.positions[edge.from];
          const dst = data.positions[edge.to];
          const [x1, y1] = bbcToImagePct(src.x, src.y);
          const [x2, y2] = bbcToImagePct(dst.x, dst.y);
          const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          line.setAttribute('x1', x1); line.setAttribute('y1', y1);
          line.setAttribute('x2', x2); line.setAttribute('y2', y2);
          line.setAttribute('stroke', 'rgba(74,144,208,0.35)');
          line.setAttribute('stroke-width', '0.5');
          svg.appendChild(line);
        }

        // Place position dots
        const container = document.getElementById('map-positions');
        container.innerHTML = '';
        // Compute direction for current-position arrow (same formula as plan marker)
        const curDir = currentNode?.plan
          ? (((8 - currentNode.plan.base_direction + currentNode.view) % 8) + 8) % 8
          : 0;
        for (const pos of data.positions) {
          const [xPct, yPct] = bbcToImagePct(pos.x, pos.y);
          if (pos.view === currentView) {
            // Render current position as a red directional arrow
            const arrow = document.createElement('div');
            arrow.className = 'map-pos-arrow';
            arrow.style.cssText = `left:${xPct}%;top:${yPct}%;transform:translate(-50%,-50%) rotate(${curDir * 45}deg)`;
            arrow.title = `Current position (view ${pos.view})`;
            arrow.innerHTML = `<svg viewBox="0 0 14 14" width="20" height="20">
              <polygon points="7,1 13,13 7,10 1,13" fill="#FFD700" stroke="#fff" stroke-width="0.8"/>
            </svg>`;
            container.appendChild(arrow);
          } else {
            const dot = document.createElement('div');
            dot.className = 'map-pos' + (pos.has_details ? ' has-details' : '');
            dot.style.cssText = `left:${xPct}%;top:${yPct}%`;
            dot.title = `View ${pos.view}` + (pos.has_details ? ' (has detail icons)' : '');
            dot.onclick = () => { jumpToView(pos.view); closeMapModal(); };
            container.appendChild(dot);
          }
        }
        document.getElementById('map-modal').style.display = 'flex';
        setStatus('');
      } catch (err) {
        setStatus(`Map failed: ${err.message}`);
      }
    }

    async function jumpToView(view) {
      setStatus(`Jumping to view ${view}…`);
      try {
        const node = await apiGet(`/api/view/${view}?dataset=${currentDatasetOffset}`);
        renderNode(node);
        setStatus('');
      } catch (err) {
        setStatus(`Failed: ${err.message}`);
      }
    }

    function closeMapModal() {
      document.getElementById('map-modal').style.display = 'none';
    }

    // ── Detail modal ──────────────────────────────────────────────────────────
    let _detailFrames = [];
    let _detailCaptions = [];
    let _detailDescriptions = [];
    let _detailPages = [];
    let _detailPageTitles = [];
    let _essayFigures = [];
    let _detailIndex = 0;
    let _essayMode = false;   // true when showing concatenated essay (no pagination)
    let _currentDetailOffset = null;  // item_offset of the currently open detail dot

    // ── Walk name ↔ offset lookup maps (populated at boot) ───────────────────
    let _walkByOffset = {};  // {6164: "brecon", 18450: "scot", ...}
    let _walkByName   = {};  // {"brecon": 6164, "scot": 18450, ...}

    // ── URL hash state ────────────────────────────────────────────────────────
    function _parseHash() {
      const params = {};
      location.hash.replace(/^#/, '').split('&').forEach(part => {
        const [k, v] = part.split('=');
        if (k) params[k] = v !== undefined ? decodeURIComponent(v) : '';
      });
      return params;
    }

    // Replace current URL hash with the current navigation state.
    // Pass extras = { dot, fig } to include an open detail or figure.
    function _pushHash(extras = {}) {
      if (currentView === null) return;
      const parts = [`v=${currentView}`];
      const walkName = _walkByOffset[currentDatasetOffset];
      if (walkName) parts.unshift(`d=${walkName}`);
      // gallery (offset 0, no entry in _walkByOffset) → d= omitted
      if (extras.dot != null) parts.push(`dot=${extras.dot}`);
      if (extras.fig != null) parts.push(`fig=${extras.fig}`);
      history.replaceState(null, '', '#' + parts.join('&'));
    }

    // Restore navigation state from the URL hash.
    // Returns true if a valid hash was found and applied.
    async function _restoreFromHash() {
      const p = _parseHash();
      if (!p.v) return false;
      const view = parseInt(p.v, 10);
      if (isNaN(view)) return false;
      let dataset = 0;
      if (p.d) {
        const byName = _walkByName[p.d];
        if (byName !== undefined) {
          dataset = byName;
        } else {
          // Backwards compat: accept raw numeric offset (old shared URLs)
          const num = parseInt(p.d, 10);
          if (!isNaN(num)) dataset = num;
        }
      }
      currentDatasetOffset = dataset;
      try {
        const node = await apiGet(`/api/view/${view}?dataset=${currentDatasetOffset}`);
        renderNode(node);
        if (p.dot != null) {
          const offset = parseInt(p.dot, 10);
          if (!isNaN(offset)) {
            await openDetailModal(offset);
            if (p.fig != null) {
              const figNum = parseInt(p.fig, 10);
              if (!isNaN(figNum)) await openEssayFigure(figNum);
            }
          }
        }
        return true;
      } catch (_) {
        return false;
      }
    }

    window.addEventListener('hashchange', () => { _restoreFromHash(); });

    async function openDetailModal(item_offset) {
      setStatus('Loading detail…');
      try {
        const data = await apiGet(
          `/api/detail?dataset=${currentDatasetOffset}&item_offset=${item_offset}`
        );
        _detailFrames = data.frames || [];
        _detailCaptions = data.captions || [];
        _detailDescriptions = data.descriptions || [];
        _detailPages = data.pages || [];
        _detailPageTitles = data.page_titles || [];
        _essayFigures = data.figures || [];
        _detailIndex = 0;
        _currentDetailOffset = item_offset;
        const TYPE_LABELS = {8:'Photo', 6:'Text', 7:'Text', 9:'Walk', 10:'Film'};
        const typeLabel = TYPE_LABELS[data.type] ?? 'Detail';
        document.getElementById('detail-modal-title').textContent =
          data.title ? `${typeLabel}: ${data.title}` : typeLabel;
        _renderDetailModal();
        document.getElementById('detail-modal').style.display = 'flex';
        _pushHash({ dot: item_offset });
        setStatus('');
      } catch (err) {
        const msg = err.message.includes('503')
          ? 'Detail unavailable (NAMES file not present)'
          : `Detail failed: ${err.message}`;
        setStatus(msg);
      }
    }

    function _detailCount() {
      return _detailFrames.length > 0 ? _detailFrames.length : _detailPages.length;
    }

    function _escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function _formatEssayText(raw) {
      return _escapeHtml(raw)
        .replace(/\{([^}]*)\}/g, '<strong>$1</strong>')
        .replace(/\[[^\d\]]*(\d{1,2})\]/g, (match, n) => {
          const fig = _essayFigures[parseInt(n, 10) - 1];
          return fig
            ? `<span class="essay-fig-link" onclick="openEssayFigure(${n})">${match}</span>`
            : match;
        });
    }

    async function openEssayFigure(figNum) {
      const fig = _essayFigures[figNum - 1];
      if (!fig) return;
      setStatus('Loading figure\u2026');
      try {
        const data = await apiGet(`/api/figure_photos?address=${fig.address}`);
        _detailFrames       = data.frames || [];
        _detailCaptions     = data.captions || [];
        _detailDescriptions = data.descriptions || [];
        _detailPages        = data.pages || [];
        _detailPageTitles   = data.page_titles || [];
        _essayFigures       = data.figures || [];
        _detailIndex        = 0;
        document.getElementById('detail-modal-title').textContent = `Figure [${figNum}]`;
        _renderDetailModal();
        _pushHash({ dot: _currentDetailOffset, fig: figNum });
        setStatus('');
      } catch (err) {
        setStatus(`Figure failed: ${err.message}`);
      }
    }

    function _renderDetailModal() {
      const modalInner     = document.getElementById('detail-modal-inner');
      const photoRow       = document.getElementById('detail-photo-row');
      const frameContainer = document.getElementById('detail-frame-container');
      const infoPanel      = document.getElementById('detail-info-panel');
      const textContainer  = document.getElementById('detail-text-container');
      const nav    = document.getElementById('detail-nav');
      const slider = document.getElementById('detail-slider');
      const captionEl = document.getElementById('detail-caption');
      const descEl    = document.getElementById('detail-description');

      const hasPhotos  = _detailFrames.length > 0;
      const hasText    = _detailPages.length  > 0;
      const essayOnly  = hasText && !hasPhotos;
      const n = hasPhotos ? _detailFrames.length : _detailPages.length;

      _essayMode = essayOnly;
      modalInner.classList.toggle('essay-mode', essayOnly);

      if (n === 0) {
        // Non-photo, non-text gallery item — show fallback message
        photoRow.style.display       = 'flex';
        infoPanel.style.display      = 'none';
        textContainer.style.display  = 'none';
        frameContainer.innerHTML =
          '<div style="display:flex;align-items:center;justify-content:center;' +
          'height:100%;color:var(--dim);font-size:0.8rem;text-align:center;padding:1rem;">' +
          'No image available for this item type.</div>';
        nav.style.display    = 'none';
        slider.style.display = 'none';
        captionEl.textContent = '';
        descEl.style.display  = 'none';
        return;
      }

      if (essayOnly) {
        // ── Concatenated scrollable essay ──────────────────────────────────
        photoRow.style.display      = 'none';
        infoPanel.style.display     = 'none';
        textContainer.style.display = 'flex';
        nav.style.display           = 'none';
        slider.style.display        = 'none';

        // Build one HTML block: optional sub-title header before each page,
        // filtered to skip empty titles and bare page-number strings (e.g. "1").
        const parts = _detailPages.map((page, idx) => {
          const sub = (_detailPageTitles[idx + 1] || '').trim();
          const showSub = sub && !/^\d+$/.test(sub);
          const header = showSub
            ? `<div class="essay-page-header">${_escapeHtml(sub)}</div>`
            : '';
          return header + _formatEssayText(page);
        });
        document.getElementById('detail-page-title').textContent = '';
        document.getElementById('detail-text').innerHTML =
          parts.join('<hr class="essay-page-sep">');
        return;
      }

      // ── Photo / paginated text mode ────────────────────────────────────────
      photoRow.style.display      = hasPhotos ? 'flex' : 'none';
      infoPanel.style.display     = hasPhotos ? 'flex' : 'none';
      textContainer.style.display = hasText   ? 'flex' : 'none';

      // Restore img element if it was replaced by the fallback message
      if (hasPhotos && !document.getElementById('detail-frame-img')) {
        frameContainer.innerHTML = '<img id="detail-frame-img" alt="Detail view" style="width:100%;height:100%;object-fit:fill;display:block;">';
      }

      const i = _detailIndex;

      nav.style.display    = 'flex';
      slider.style.display = n > 1 ? 'block' : 'none';

      if (hasPhotos) {
        document.getElementById('detail-frame-img').src = `/frame/${_detailFrames[i]}`;
        captionEl.textContent = _detailCaptions[i] || '';
        const description = _detailDescriptions[i] || '';
        descEl.textContent   = description;
        descEl.style.display = description ? 'block' : 'none';
      } else {
        captionEl.textContent = '';
        descEl.style.display  = 'none';
        document.getElementById('detail-page-title').textContent = _detailPageTitles[i + 1] || '';
        document.getElementById('detail-text').innerHTML = _formatEssayText(_detailPages[i]);
      }

      // Sync number input, total label, and slider
      const numEl = document.getElementById('detail-num');
      numEl.max   = n;
      numEl.value = i + 1;
      document.getElementById('detail-total').textContent = n;
      slider.max   = n;
      slider.value = i + 1;

      // Button states
      document.getElementById('detail-btn-first').disabled = i === 0;
      document.getElementById('detail-btn-prev').disabled  = i === 0;
      document.getElementById('detail-btn-next').disabled  = i === n - 1;
      document.getElementById('detail-btn-last').disabled  = i === n - 1;
    }

    function goDetail(idx) {
      _detailIndex = Math.max(0, Math.min(_detailCount() - 1, idx));
      _renderDetailModal();
    }

    function stepDetail(dir) {
      goDetail(_detailIndex + dir);
    }

    function closeDetailModal() {
      document.getElementById('detail-modal').style.display = 'none';
      _currentDetailOffset = null;
      _pushHash();
    }

    // ── Utilities ────────────────────────────────────────────────────────────
    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    // ── Boot ──────────────────────────────────────────────────────────────────
    async function boot() {
      currentDatasetOffset = 0;
      try {
        const cfg = await apiGet('/api/config');
        if (typeof cfg.bbc_h_offset === 'number') BBC_H_OFFSET = cfg.bbc_h_offset;
        if (typeof cfg.bbc_h_scale  === 'number') BBC_H_SCALE  = cfg.bbc_h_scale;
        if (typeof cfg.bbc_v_offset === 'number') BBC_V_OFFSET = cfg.bbc_v_offset;
        if (typeof cfg.bbc_v_scale  === 'number') BBC_V_SCALE  = cfg.bbc_v_scale;
      } catch (_) { /* use defaults */ }

      // Build walk name ↔ offset lookup maps
      try {
        const walks = await apiGet('/api/walks');
        walks.forEach(w => {
          _walkByOffset[w.gallery_offset] = w.name.toLowerCase();
          _walkByName[w.name.toLowerCase()] = w.gallery_offset;
        });
      } catch (_) { /* walk names unavailable; fall back to numeric offsets */ }

      // Restore from shared URL hash if present; otherwise load initial view
      const restored = await _restoreFromHash();
      if (restored) return;

      setStatus('Loading initial view…');
      try {
        const node = await apiGet('/api/initial');
        renderNode(node);
      } catch (err) {
        setStatus(`Failed to load: ${err.message}`);
        framePlaceholder.textContent = 'Failed to load gallery';
      }
    }

    boot();
  </script>
</body>
</html>
